- name: Remove a snapshot
  vmware.vmware.vm_snapshot:
    hostname: "{{ vcenter_hostname }}"
    username: "{{ vcenter_username }}"
    password: "{{ vcenter_password }}"
    port: "{{ vcenter_port }}"
    datacenter: "{{ vcenter_datacenter }}"
    folder: "/{{ vcenter_datacenter }}/vm/"
    name: "{{ test_esxi_hostname }}"
    state: absent
    snapshot_name: snap1
    validate_certs: false

- name: Remove all snapshots of a VM
  vmware.vmware.vm_snapshot:
    hostname: "{{ vcenter_hostname }}"
    username: "{{ vcenter_username }}"
    password: "{{ vcenter_password }}"
    port: "{{ vcenter_port }}"
    datacenter: "{{ vcenter_datacenter }}"
    folder: "/{{ vcenter_datacenter }}/vm/"
    name: "{{ test_esxi_hostname }}"
    state: absent
    remove_all: True
    validate_certs: false

- name: Remove all snapshots of a VM using MoID
  vmware.vmware.vm_snapshot:
    hostname: "{{ vcenter_hostname }}"
    username: "{{ vcenter_username }}"
    password: "{{ vcenter_password }}"
    port: "{{ vcenter_port }}"
    datacenter: "{{ vcenter_datacenter }}"
    moid: "{{ deploy.vm.moid }}"
    state: absent
    remove_all: True
    validate_certs: false

- name: Take snapshot of a VM using quiesce and memory flag on
  vmware.vmware.vm_snapshot:
    hostname: "{{ vcenter_hostname }}"
    username: "{{ vcenter_username }}"
    password: "{{ vcenter_password }}"
    port: "{{ vcenter_port }}"
    datacenter: "{{ vcenter_datacenter }}"
    folder: "/{{ vcenter_datacenter }}/vm/"
    name: "{{ test_esxi_hostname }}"
    state: present
    snapshot_name: dummy_vm_snap_0001
    quiesce: true
    memory_dump: true
    validate_certs: false
  register: deploy

- name: Remove a snapshot and snapshot subtree
  vmware.vmware.vm_snapshot:
    hostname: "{{ vcenter_hostname }}"
    username: "{{ vcenter_username }}"
    password: "{{ vcenter_password }}"
    port: "{{ vcenter_port }}"
    datacenter: "{{ vcenter_datacenter }}"
    folder: "/{{ vcenter_datacenter }}/vm/"
    name: "{{ test_esxi_hostname }}"
    state: absent
    remove_children: true
    snapshot_name: dummy_vm_snap_0001
    validate_certs: false

- name: Create a snapshot
  vmware.vmware.vm_snapshot:
    hostname: "{{ vcenter_hostname }}"
    username: "{{ vcenter_username }}"
    password: "{{ vcenter_password }}"
    port: "{{ vcenter_port }}"
    datacenter: "{{ vcenter_datacenter }}"
    folder: "/{{ vcenter_datacenter }}/vm/"
    name: "{{ test_esxi_hostname }}"
    state: present
    snapshot_name: snap1
    description: snap1_description
    validate_certs: false
  register: deploy

- name: Rename a snapshot
  vmware.vmware.vm_snapshot:
    hostname: "{{ vcenter_hostname }}"
    username: "{{ vcenter_username }}"
    password: "{{ vcenter_password }}"
    port: "{{ vcenter_port }}"
    datacenter: "{{ vcenter_datacenter }}"
    folder: "/{{ vcenter_datacenter }}/vm/"
    name: "{{ test_esxi_hostname }}"
    state: present
    snapshot_name: snap1
    new_snapshot_name: im_renamed
    new_description: im_redescribed
    validate_certs: false

- name: Remove a snapshot with a snapshot id
  vmware.vmware.vm_snapshot:
    hostname: "{{ vcenter_hostname }}"
    username: "{{ vcenter_username }}"
    password: "{{ vcenter_password }}"
    port: "{{ vcenter_port }}"
    datacenter: "{{ vcenter_datacenter }}"
    folder: "/{{ vcenter_datacenter }}/vm/"
    name: "{{ test_esxi_hostname }}"
    snapshot_id: "{{ deploy.snapshot_results.current_snapshot.id }}"
    state: absent
    validate_certs: false