---
- block:
    - name: Import common vars
      ansible.builtin.include_vars:
        file: ../group_vars.yml
      when: not run_on_simulator

    - name: "Test setup: Create VM guest {{ vm }}"
      community.vmware.vmware_guest:
        validate_certs: false
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        cluster: "{{ vm_cluster }}"
        datacenter: "{{ vm_datacenter }}"
        folder: "{{ vm_folder }}"
        state: present
        name: "{{ vm }}"
        disk: "{{ vm_disk }}"
        guest_id: "{{ vm_guest_id }}"
        hardware: "{{ vm_hardware }}"
        # cdrom:
        # - controller_number: 0
        #   unit_number: 0
        #   state: present
        #   type: iso
        #   iso_path: "[ro_datastore] fedora.iso"
      when: not run_on_simulator

    - name: Set the state of a virtual machine to poweron
      vmware.vmware.vmware_guest_powerstate:
        datacenter: "{{ vm_datacenter }}"
        validate_certs: false
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        folder: "{{ vm_folder }}"
        name: "{{ vm }}"
        state: present
      register: deploy

    - name: Restart the virtual machine
      vmware.vmware.vmware_guest_powerstate:
        datacenter: "{{ vm_datacenter }}"
        validate_certs: false
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        folder: "{{ vm_folder }}"
        name: "{{ vm }}"
        state: restarted

    - name: Set the state of a virtual machine to poweroff using MoID
      vmware.vmware.vmware_guest_powerstate:
        datacenter: "{{ vm_datacenter }}"
        validate_certs: false
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        folder: "{{ vm_folder }}"
        moid: "{{ deploy.instance.moid }}"
        state: powered-off

    - name: Set the state of a virtual machine to poweron using MoID
      vmware.vmware.vmware_guest_powerstate:
        datacenter: "{{ vm_datacenter }}"
        validate_certs: false
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        folder: "{{ vm_folder }}"
        moid: "{{ deploy.instance.moid }}"
        state: powered-on
      register: deploy

    - name: Suspend the virtual machine
      vmware.vmware.vmware_guest_powerstate:
        datacenter: "{{ vm_datacenter }}"
        validate_certs: false
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        folder: "{{ vm_folder }}"
        name: "{{ vm }}"
        state: suspended

    - name: Power on the virtual machine without force
      vmware.vmware.vmware_guest_powerstate:
        datacenter: "{{ vm_datacenter }}"
        validate_certs: false
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        folder: "{{ vm_folder }}"
        name: "{{ vm }}"
        state: present
      ignore_errors: true
      register: failed_power_on

    - name: Verify power on failed
      ansible.builtin.assert:
        that:
          - failed_power_on.failed

    - name: Power on the virtual machine with force
      vmware.vmware.vmware_guest_powerstate:
        datacenter: "{{ vm_datacenter }}"
        validate_certs: false
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        folder: "{{ vm_folder }}"
        name: "{{ vm }}"
        state: present
        force: true


    - name: Set the state of a virtual machine to poweroff at given scheduled time
      vmware.vmware.vmware_guest_powerstate:
        datacenter: "{{ vm_datacenter }}"
        validate_certs: false
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        folder: "{{ vm_folder }}"
        name: "{{ vm }}"
        state: powered-off
        scheduled_at: "09/03/2025 10:18"
        schedule_task_name: "task_00001"
        schedule_task_description: "Sample task to poweroff VM"
        schedule_task_enabled: true

    - name: Reboot the virtual machine with force
      vmware.vmware.vmware_guest_powerstate:
        datacenter: "{{ vm_datacenter }}"
        validate_certs: false
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        folder: "{{ vm_folder }}"
        name: "{{ vm }}"
        state: reboot-guest
        force: true
        
    - name: Set the state of a virtual machine to poweron using MoID
      vmware.vmware.vmware_guest_powerstate:
        datacenter: "{{ vm_datacenter }}"
        validate_certs: false
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        folder: "{{ vm_folder }}"
        moid: "{{ deploy.instance.moid }}"
        state: powered-on
      register: deploy

    - name: Install vm-tools
      vmware.vmware_rest.vcenter_vm_tools_installer:
        vcenter_validate_certs: false
        vcenter_hostname: "{{ vcenter_hostname }}"
        vcenter_username: "{{ vcenter_username }}"
        vcenter_password: "{{ vcenter_password }}"
        vm: "{{ deploy.instance.moid }}"
        state: connect

    - name: Wait for the virtual machine to shutdown
      vmware.vmware.vmware_guest_powerstate:
        datacenter: "{{ vm_datacenter }}"
        validate_certs: false
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        name: "{{ vm }}"
        state: shutdown-guest
        state_change_timeout: 200

    - name: Power on a virtual machine with the answer param
      vmware.vmware.vmware_guest_powerstate:
        datacenter: "{{ vm_datacenter }}"
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        validate_certs: false
        folder: "{{ vm_folder }}"
        name: "{{ vm }}"
        answer:
          - question: "msg.uuid.altered"
            response: "button.uuid.copiedTheVM"
        state: powered-on

  always:
    - name: "Test teardown: Destroy VM guest {{ vm }}"
      community.vmware.vmware_guest:
        validate_certs: false
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        cluster: "{{ vm_cluster }}"
        datacenter: "{{ vm_datacenter }}"
        folder: "{{ vm_folder }}"
        state: absent
        force: true
        name: "{{ vm }}"
      when: not run_on_simulator