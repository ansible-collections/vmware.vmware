---
- block:
    - name: Import common vars
      ansible.builtin.include_vars:
        file: ../group_vars.yml
      when: not run_on_simulator

    - name: Lookup Root Resource Pool ID
      ansible.builtin.set_fact:
        vcenter_rp_id: >-
          {{ lookup('vmware.vmware_rest.resource_pool_moid', '/' + vcenter_datacenter + '/' + vcenter_cluster_name + '/' + vcenter_resource_pool,
          vcenter_hostname=vcenter_hostname,
          vcenter_username=vcenter_username,
          vcenter_password=vcenter_password,
          vcenter_validate_certs=false,
          ) }}

    - name: Create a test resource pool
      vmware.vmware_rest.vcenter_resourcepool:
        vcenter_hostname: "{{ vcenter_hostname }}"
        vcenter_username: "{{ vcenter_username }}"
        vcenter_password: "{{ vcenter_password }}"
        vcenter_validate_certs: false
        name: "{{ test_resource_pool }}"
        parent: "{{ vcenter_rp_id }}"
      register: _test_rp

    - name: Deploy Virtual Machine from template in content library
      community.vmware.vmware_content_deploy_template:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
        validate_certs: false
        template: "{{ rhel9_content_library_template }}"
        datastore: "{{ datastore }}"
        folder: "{{ vm_folder }}"
        datacenter: "{{ vm_datacenter }}"
        name: "Sample_VM"
        resource_pool: "{{ test_resource_pool }}"
        state: present
      delegate_to: localhost

    # - name: Deploy VM
    #   vmware.vmware.vmware_content_deploy_template:
    #     hostname: "{{ vcenter_hostname }}"
    #     username: "{{ vcenter_username }}"
    #     password: "{{ vcenter_password }}"
    #     validate_certs: false
    #     datacenter: "{{ vm_datacenter }}"
    #     datastore: "{{ datastore }}"
    #     library_item_name: "{{ rhel9_content_library_template }}"
    #     library_name: "{{ ci_resources_content_library }}"
    #     vm_name: "{{ test_vm_name }}"
    #     resource_pool: "{{ test_resource_pool }}"
    #   register: _deploy

    - name: Set the state of a virtual machine to poweron
      vmware.vmware.vmware_guest_powerstate:
        datacenter: "{{ vm_datacenter }}"
        validate_certs: false
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        folder: "{{ vm_folder }}"
        name: "{{ vm }}"
        state: present
      register: deploy

    - name: Restart the virtual machine
      vmware.vmware.vmware_guest_powerstate:
        datacenter: "{{ vm_datacenter }}"
        validate_certs: false
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        folder: "{{ vm_folder }}"
        name: "{{ vm }}"
        state: restarted

    - name: Set the state of a virtual machine to poweroff using MoID
      vmware.vmware.vmware_guest_powerstate:
        datacenter: "{{ vm_datacenter }}"
        validate_certs: false
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        folder: "{{ vm_folder }}"
        moid: "{{ deploy.instance.moid }}"
        state: powered-off

    - name: Set the state of a virtual machine to poweron using MoID
      vmware.vmware.vmware_guest_powerstate:
        datacenter: "{{ vm_datacenter }}"
        validate_certs: false
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        folder: "{{ vm_folder }}"
        moid: "{{ deploy.instance.moid }}"
        state: powered-on
      register: deploy

    - name: Suspend the virtual machine
      vmware.vmware.vmware_guest_powerstate:
        datacenter: "{{ vm_datacenter }}"
        validate_certs: false
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        folder: "{{ vm_folder }}"
        name: "{{ vm }}"
        state: suspended

    - name: Power on the virtual machine without force
      vmware.vmware.vmware_guest_powerstate:
        datacenter: "{{ vm_datacenter }}"
        validate_certs: false
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        folder: "{{ vm_folder }}"
        name: "{{ vm }}"
        state: present
      ignore_errors: true
      register: failed_power_on

    - name: Verify power on failed
      ansible.builtin.assert:
        that:
          - failed_power_on.failed

    - name: Power on the virtual machine with force
      vmware.vmware.vmware_guest_powerstate:
        datacenter: "{{ vm_datacenter }}"
        validate_certs: false
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        folder: "{{ vm_folder }}"
        name: "{{ vm }}"
        state: present
        force: true


    - name: Set the state of a virtual machine to poweroff at given scheduled time
      vmware.vmware.vmware_guest_powerstate:
        datacenter: "{{ vm_datacenter }}"
        validate_certs: false
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        folder: "{{ vm_folder }}"
        name: "{{ vm }}"
        state: powered-off
        scheduled_at: "09/03/2025 10:18"
        scheduled_task_name: "task_00001"
        scheduled_task_description: "Sample task to poweroff VM"
        scheduled_task_enabled: true

    - name: Install vm-tools
      vmware.vmware_rest.vcenter_vm_tools_installer:
        vcenter_validate_certs: false
        vcenter_hostname: "{{ vcenter_hostname }}"
        vcenter_username: "{{ vcenter_username }}"
        vcenter_password: "{{ vcenter_password }}"
        vm: "{{ deploy.instance.moid }}"
        state: connect

    - name: Reboot the virtual machine with force
      vmware.vmware.vmware_guest_powerstate:
        datacenter: "{{ vm_datacenter }}"
        validate_certs: false
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        folder: "{{ vm_folder }}"
        name: "{{ vm }}"
        state: reboot-guest
        force: true
        
    - name: Set the state of a virtual machine to poweron using MoID
      vmware.vmware.vmware_guest_powerstate:
        datacenter: "{{ vm_datacenter }}"
        validate_certs: false
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        folder: "{{ vm_folder }}"
        moid: "{{ deploy.instance.moid }}"
        state: powered-on
      register: deploy

    - name: Wait for the virtual machine to shutdown
      vmware.vmware.vmware_guest_powerstate:
        datacenter: "{{ vm_datacenter }}"
        validate_certs: false
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        name: "{{ vm }}"
        state: shutdown-guest
        timeout: 200

    - name: Power on a virtual machine with the question_answers param
      vmware.vmware.vmware_guest_powerstate:
        datacenter: "{{ vm_datacenter }}"
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        validate_certs: false
        folder: "{{ vm_folder }}"
        name: "{{ vm }}"
        question_answers:
          - question: "msg.uuid.altered"
            response: "button.uuid.copiedTheVM"
        state: powered-on

  always:
    - name: Delete test resource pool
      vmware.vmware_rest.vcenter_resourcepool:
        vcenter_hostname: "{{ vcenter_hostname }}"
        vcenter_username: "{{ vcenter_username }}"
        vcenter_password: "{{ vcenter_password }}"
        vcenter_validate_certs: false
        name: "{{ test_resource_pool }}"
        parent: "{{ vcenter_rp_id }}"
        state: absent
        
    - name: "Test teardown: Destroy VM guest {{ vm }}"
      community.vmware.vmware_guest:
        validate_certs: false
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        cluster: "{{ vm_cluster }}"
        datacenter: "{{ vm_datacenter }}"
        folder: "{{ vm_folder }}"
        state: absent
        force: true
        name: "{{ vm }}"
      when: not run_on_simulator