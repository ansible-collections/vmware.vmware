---
# vcsim exposes CustomFieldsManager but SetField on a VM may not produce
# persistent results on the simulator. The assertion below validates that
# the module reports a change when attributes are provided.
- name: Test
  environment: "{{ environment_auth_vars }}"

  block:
    - name: Add custom attribute to VM
      vmware.vmware.vm_custom_attributes:
        name: "{{ vm }}"
        state: present
        attributes:
          TestAttribute: TestValue
      register: _add

    - name: Check that the module reported a change
      ansible.builtin.assert:
        that:
          - _add is changed

    - name: Add custom attribute with integer value
      vmware.vmware.vm_custom_attributes:
        name: "{{ vm }}"
        state: present
        attributes:
          IntAttribute: 99
      register: _add_int

    - name: Add custom attribute with boolean value
      vmware.vmware.vm_custom_attributes:
        name: "{{ vm }}"
        state: present
        attributes:
          BoolAttribute: true
      register: _add_bool

    - name: Check that the module reported changes for different value types
      ansible.builtin.assert:
        that:
          - _add_int is changed
          - _add_bool is changed
